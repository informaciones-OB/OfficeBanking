<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Banking</title>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #333;
        }
        .header {
            background-color: #E60021;
            padding: 20px;
            text-align: center;
        }
        .header img {
            max-width: 200px;
        }
        .swiper {
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="imagenes/logo.png" alt="Office Banking Logo">
    </div>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide" style="background-image: url('imagenes/slide1.jpg');"></div>
            <div class="swiper-slide" style="background-image: url('imagenes/slide2.jpg');"></div>
            <div class="swiper-slide" style="background-image: url('imagenes/slide3.jpg');"></div>
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper', {
            loop: true,
            pagination: {
                el: '.swiper-pagination',
                clickable: true,
            },
            navigation: {
                nextEl: '.swiper-button-next',
                prevEl: '.swiper-button-prev',
            },
        });
    </script>
</body>
</html>
